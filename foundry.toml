[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
auto_detect_solc = false
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "deployments/" }]

# Remappings
remappings = [
    "@luxfi/standard/=lib/luxfi-standard/contracts/",
    "@openzeppelin/contracts/=lib/luxfi-standard/lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/=lib/luxfi-standard/lib/openzeppelin-contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/luxfi-standard/lib/openzeppelin-contracts-upgradeable/contracts/",
    "@gnosis.pm/safe-contracts/=lib/luxfi-standard/lib/safe-smart-account/contracts/",
    "@account-abstraction/=lib/luxfi-standard/lib/account-abstraction/contracts/",
    "@prb/math/=lib/luxfi-standard/lib/prb-math/src/",
    "solmate/=lib/solmate/src/",
]

# CI profile
[profile.ci]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
auto_detect_solc = false
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
verbosity = 2
fuzz = { runs = 256 }
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "solmate/=lib/solmate/src/",
]

# Fuzz testing
[fuzz]
runs = 1000
max_test_rejects = 65536

# Invariant testing
[invariant]
runs = 256
depth = 15

# Formatter
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
